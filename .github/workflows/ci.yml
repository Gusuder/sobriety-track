name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  smoke-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Run smoke E2E
        shell: pwsh
        run: ./scripts/smoke-e2e.ps1

      - name: Dump compose status
        if: always()
        run: docker compose ps

      - name: Dump API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Stop services
        if: always()
        run: docker compose down -v

  web-regression-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package.json

      - name: Install E2E dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build and start services
        working-directory: .
        run: docker compose up --build -d

      - name: Run web regression E2E
        run: npm test

      - name: Dump compose status
        if: always()
        working-directory: .
        run: docker compose ps

      - name: Dump API logs on failure
        if: failure()
        working-directory: .
        run: docker compose logs api

      - name: Stop services
        if: always()
        working-directory: .
        run: docker compose down -v

  windows-ci-local-script:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Run ci-local script (fast mode)
        run: .\scripts\ci-local.ps1 -SkipSmoke -SkipWebE2E
