services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sobriety_track
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sobriety_track"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: nginx:alpine
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

  api:
    build:
      context: ./apps/api
    environment:
      PORT: 4000
      JWT_SECRET: change-me-super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sobriety_track
      REDIS_URL: redis://redis:6379
      TRUST_PROXY: "true"
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
